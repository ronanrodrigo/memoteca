name: "Feature Request / Task"
description: "Template para tasks do memotek (criação, adição, bug fix)"
labels: ["memotek"]
body:
  - type: markdown
    attributes:
      value: |
        # Nova Task Memotek
        Preencha as informações abaixo para iniciar o pipeline.

  - type: dropdown
    id: task-type
    attributes:
      label: "Tipo de Task"
      description: "Selecione o tipo de task"
      options:
        - "Criação de Projeto"
        - "Adição ao Sistema"
        - "Correção de Bug"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Descrição"
      description: "Descreva o que precisa ser feito"
      placeholder: "Ex: Criar um sistema para cadastro de componentes químicos"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "Detalhes Adicionais"
      description: "Informações extras, referências, etc."
      placeholder: "Ex: Precisa de autenticação, dashboard com gráficos..."

  - type: dropdown
    id: persistence
    attributes:
      label: "Persistência de Dados"
      description: "Precisa salvar dados?"
      options:
        - "Sim (Supabase)"
        - "Não"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "Referências"
      description: "Links de inspiração ou projetos similares"
      placeholder: "https://exemplo.com"

  - type: textarea
    id: reproduction
    attributes:
      label: "Passos para Reproduzir (Bug Fix)"
      description: "Apenas para bugs: como reproduzir o problema"
      placeholder: "1. Acessar /cadastro\n2. Preencher campo\n3. Clicar em salvar"
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: "Comportamento Esperado vs Atual (Bug Fix)"
      description: "Apenas para bugs: o que deveria acontecer vs o que acontece"
      placeholder: "Esperado: Salvar com maiúsculas\nAtual: Converte para minúsculas"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pipeline"
      options:
        - label: "Intake completo"
          required: false
        - label: "Research: benchmarking concluído"
          required: false
        - label: "Stack definida"
          required: false
        - label: "Código implementado"
          required: false
        - label: "Deploy preview funcional"
          required: false
        - label: "Pipeline CI configurada"
          required: false
        - label: "PR criado"
          required: false
        - label: "Checks todos verdes"
          required: false
        - label: "Preview testado via HTTP"
          required: false
        - label: "PR mergeado"
          required: false
        - label: "Deploy produção concluído"
          required: false

  - type: markdown
    attributes:
      value: |
        ## Stack Selecionada
        *Preenchido pelo Stack Selector Agent*

        ## Referências (Research)
        *Preenchido pelo Researcher Agent*

        ## Deploy
        - Preview: *Pendente*
        - Produção: *Pendente*

        ## Progresso
        <!-- Atualizado a cada etapa -->
