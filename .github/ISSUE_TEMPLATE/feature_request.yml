name: "Feature Request / Task"
description: "Template for memoteca tasks (creation, addition, bug fix)"
labels: ["memoteca"]
body:
  - type: markdown
    attributes:
      value: |
        # New Memoteca Task
        Fill in the information below to start the pipeline.

        > After filing, **add this issue to the central board** so the orchestrator picks it up:
        > ```
        > make project-add-issue ISSUE_URL=https://github.com/<owner>/<repo>/issues/<NN>
        > ```
        > (Or skip this step if the Projects V2 "Auto-add" workflow for the `memoteca` label is configured on the board.)

  - type: dropdown
    id: task-type
    attributes:
      label: "Task Type"
      description: "Select the task type"
      options:
        - "Project Creation"
        - "System Addition"
        - "Bug Fix"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe what needs to be done"
      placeholder: "Ex: Create a system for registering chemical components"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "Additional Details"
      description: "Extra information, references, etc."
      placeholder: "Ex: Needs authentication, dashboard with charts..."

  - type: dropdown
    id: persistence
    attributes:
      label: "Data Persistence"
      description: "Need to save data?"
      options:
        - "Yes (Supabase)"
        - "No"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "References"
      description: "Inspiration links or similar projects"
      placeholder: "https://example.com"

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce (Bug Fix)"
      description: "Only for bugs: how to reproduce the issue"
      placeholder: "1. Access /register\n2. Fill in field\n3. Click save"
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: "Expected vs Actual Behavior (Bug Fix)"
      description: "Only for bugs: what should happen vs what happens"
      placeholder: "Expected: Save with uppercase\nActual: Converts to lowercase"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pipeline"
      options:
        - label: "Intake completed"
          required: false
        - label: "Research: benchmarking completed"
          required: false
        - label: "Stack defined"
          required: false
        - label: "Code implemented"
          required: false
        - label: "Deploy preview functional"
          required: false
        - label: "CI pipeline configured"
          required: false
        - label: "PR created"
          required: false
        - label: "All checks green"
          required: false
        - label: "Preview tested via HTTP"
          required: false
        - label: "PR merged"
          required: false
        - label: "Production deploy completed"
          required: false

  - type: markdown
    attributes:
      value: |
        ## Selected Stack
        *Filled by the Stack Selector Agent*

        ## References (Research)
        *Filled by the Researcher Agent*

        ## Deploy
        - Preview: *Pending*
        - Production: *Pending*

        ## Progress
        <!-- Updated at each step -->
