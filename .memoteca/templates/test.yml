# CI Tests
#
# Requires the project repo to have targets in the Makefile:
#   make install, make lint, make typecheck, make test, make build,
#   make install-playwright, make test-e2e
#
# These targets are automatically created by the scaffold.

name: CI Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Type Check
        run: make typecheck

      - name: Unit Tests
        run: make test

      - name: Build
        run: make build

      - name: Install Playwright
        run: make install-playwright

      - name: E2E Tests
        run: make test-e2e
